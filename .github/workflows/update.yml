name: Update NBA Data

on:
  schedule:
    - cron: '0 14 * * *' # Uruchamia się codziennie o 11:00 UTC (12:00 w Polsce)
  workflow_dispatch: # Pozwala uruchomić skrypt ręcznie guzikiem

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pozwala botowi nadpisywać plik dane.json

    steps:
    - name: Pobieranie plików z repozytorium
      uses: actions/checkout@v4

    - name: Instalacja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Uruchomienie Twojego algorytmu
      run: python update_data.py

    - name: Zapisanie nowych danych (dane.json) na stronie
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add dane.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Automatyczna aktualizacja kursów NBA"
        git push
